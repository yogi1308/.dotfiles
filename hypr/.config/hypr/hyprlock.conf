# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

general {
    hide_cursor = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    # A custom 'snap' curve that goes from 0 to 1 immediately
    bezier = snap, 0, 1, 0, 1
    
    # Apply the snap to the input field's state changes
    animation = inputFieldColors, 1, 1, snap
}

background {
    monitor =
    path = ~/.dotfiles/backgrounds/.config/backgrounds/bg_edited.jpg
    blur_passes = 5
    blur_size = 1
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(00baffee)
    inner_color = rgba(0, 0, 0, 0.7) 
    font_color = rgba(ffffffff)
    
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <span font_family="JetBrainsMono Nerd Font"><i>󰌾 Enter Password... </i></span>
    
    hide_input = false
    check_color = rgba(00baffee)
    fail_timeout = 2000
    fail_color = rgba(ff5c5cee)
    fail_transition = 0
    fail_text = <i>Attempts: $ATTEMPTS/3</i>
    capslock_color = rgba(f9e2afff) # Yellow
    
    position = 0, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 50
    font_family = JetBrainsMono Nerd Font

    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 15
    font_family = JetBrainsMono Nerd Font

    position = -30, -80
    halign = right
    valign = top
}
