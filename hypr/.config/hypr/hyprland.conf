##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Sushi Rules to quickly preview files using sushi in thunar
windowrule = float on, match:class ^(org.gnome.NautilusPreviewer)$
windowrule = center on, match:class ^(org.gnome.NautilusPreviewer)$
windowrule = size 800 600, match:class ^(org.gnome.NautilusPreviewer)$


# windowrules for clipse(clipboard manager)
windowrule = match:class clipse, float true # ensure you have a floating window class set if you want this behavior
windowrule = match:class clipse, size 800 400 # set the size of the window as necessary

# blur rofi background
layerrule = blur on, ignore_alpha 0.5, match:namespace rofi

# Correct syntax for Kitty (Window)
windowrulev = blur, class:^(kitty)$
windowrulev = ignorealpha 0.5, class:^(kitty)$

# windowrules for clipse(clipboard manager)
windowrule = match:class nmtui, float true # ensure you have a floating window class set if you want this behavior
windowrule = match:class nmtui, size 800 400 # set the size of the window as necessary

layerrule = blur_popups on, match:namespace waybar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar
layerrule = xray 1, match:namespace waybar

layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

windowrule = match:class org.kde.kdeconnect.app, float on, size 900 600

windowrule = match:class xdg-desktop-portal-gtk, float on, size 900 600, center on
windowrule = match:title Picture in Picture, float on, size 340 200, move 930 515
windowrule = match:title Untitled - Opera, float on, size 600 500, center on
windowrule = match:title about:blank - Opera, float on, size 600 500, center on
windowrule = match:class blueman-manager, float on, size 600 500, center on
windowrule = match:class bluetui, float on, size 600 500, center on
windowrule = match:class weather-tui, float on, size 670 625, center on
windowrule = match:title Loading… - Opera, float on, size 350 700, move 930 0
windowrule = match:title Ablaze Floorp, float on, size 600 500, center on
windowrule = match:title File Upload, float on, size 900 600, center on
windowrule = match:title Picture-in-Picture, float on, size 340 200, move 930 515
windowrule = match:title Zen Browser, float on, size 600 500, center on
windowrule = match:title Receiving file, float on, size 600 250, center on
windowrule = match:title Extract, float on, size 600 600, center on
