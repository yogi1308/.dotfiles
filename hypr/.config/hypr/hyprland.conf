# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.2
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# ###################
# ### KEYBINDINGS ###
# ###################

$mainMod = SUPER 

# Applications
bind = $mainMod, return,        exec, $terminal                                                                                                         # Open terminal
bind = $mainMod, E,             exec, $fileManager                                                                                                      # Open file manager
bind = $mainMod, W,             exec, $browser                                                                                                          # Open browser
bind = $mainMod, space,         exec, pkill rofi || $menu                                                                                               # App launcher
bind = SUPER_ALT, SPACE,        exec, pkill rofi || rofimoji                                                                                            # Emoji picker
bind = $SUPER_SHIFT, SPACE,     exec, pkill rofi || rofi -show rofiftw -modes "rofiftw:~/.config/rofiftw/rofiftw-wrapper.sh,surfraw:~/.config/surfraw/custom-rofi-surfraw.sh,llm:~/.config/rofillm/rofi-claude.sh" # Multi-mode launcher
bind = $mainMod CONTROL, SPACE, exec, pkill rofi || ~/.config/rofi-hyprland-keybinds-cheatsheet/rofi_keybinds.sh                                        # Keybinds cheatsheet
bind = SUPER_ALT, R,            exec, killall waybar && waybar &                                                                                        # Restart waybar
bind = $mainMod, B,             exec, pkill -USR1 waybar &                                                                                              # Toggle waybar
bind = $SUPER_SHIFT, B, exec, kitty --class "bluetui" -e bluetui                                                                                            # Opens BlueTUI
bind = $SUPER_SHIFT, W, exec, kitty --class "nmtui" -e nmtui                                                                                                # OPens NMTUI

# Window Management
bind = $mainMod, C,             killactive                                                                                                             # Close window
bind = $mainMod, V,             togglefloating                                                                                                         # Toggle floating
bind = $mainMod, P,             pseudo                                                                                                                 # Toggle pseudo tiling
bind = $mainMod, J,             layoutmsg, togglesplit                                                                                                  # Toggle split
bind = $mainMod, M,             exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit                                  # Exit Hyprland
bind = $mainMod, D,             exec, ~/.config/scripts/show-desktop.sh                                                                                 # Show desktop

# Swap Windows
bind = $mainMod SHIFT, left,    swapwindow, l                                                                                                           # Swap window left
bind = $mainMod SHIFT, right,   swapwindow, r                                                                                                           # Swap window right
bind = $mainMod SHIFT, up,      swapwindow, u                                                                                                           # Swap window up
bind = $mainMod SHIFT, down,    swapwindow, d                                                                                                           # Swap window down

# Screenshots
bind = , PRINT,                 exec, hyprshot -z -m region -o ~/Pictures/Screenshots                                                                   # Screenshot region
bind = shift, PRINT,            exec, hyprshot -z -m window -o ~/Pictures/Screenshots                                                                   # Screenshot window
bind = CONTROL SHIFT, PRINT,    exec, hyprshot -z -m output -o ~/Pictures/Screenshots                                                                   # Screenshot output
bind = $SUPER_SHIFT, d,         exec, hyprlock                                                                                                          # Lock screen
bind = $SUPER_SHIFT, c,         exec, hyprpicker -a                                                                                                     # Color picker
bind = $mainMod SHIFT, T,       exec, ~/.config/scripts/text-extractor.sh                                                                               # Extract text (OCR)

# Recording
bind = $mainMod, R,             exec, pkill -x wl-screenrec && notify-send "Recording" "Stopped and saved" || (wl-screenrec -g "$(slurp)" -f ~/Videos/"Screen Recordings"/"Screen Recording $(date +%Y-%m-%d_%H-%M-%S).mp4" --low-power on --ffmpeg-encoder-options "rc_mode=CQP") # Record region
bind = $mainMod SHIFT, R,       exec, pkill -x wl-screenrec && notify-send "Recording" "Stopped and saved" || (wl-screenrec -o eDP-1 -f ~/Videos/"Screen Recordings"/"Screen Recording $(date +%Y-%m-%d_%H-%M-%S).mp4" --low-power on --ffmpeg-encoder-options "rc_mode=CQP")       # Record screen

# Clipboard
bind = $SUPER_SHIFT, V,         exec, pkill clipse || kitty --class clipse -e 'clipse'                                                                  # Clipboard history

# Move Focus
bind = $mainMod, left,          movefocus, l                                                                                                            # Focus left
bind = $mainMod, right,         movefocus, r                                                                                                            # Focus right
bind = $mainMod, up,            movefocus, u                                                                                                            # Focus up
bind = $mainMod, down,          movefocus, d                                                                                                            # Focus down

# Workspaces
bind = $mainMod, 1,             workspace, 1                                                                                                            # Workspace 1
bind = $mainMod, 2,             workspace, 2                                                                                                            # Workspace 2
bind = $mainMod, 3,             workspace, 3                                                                                                            # Workspace 3
bind = $mainMod, 4,             workspace, 4                                                                                                            # Workspace 4
bind = $mainMod, 5,             workspace, 5                                                                                                            # Workspace 5
bind = $mainMod, 6,             workspace, 6                                                                                                            # Workspace 6
bind = $mainMod, 7,             workspace, 7                                                                                                            # Workspace 7
bind = $mainMod, 8,             workspace, 8                                                                                                            # Workspace 8
bind = $mainMod, 9,             workspace, 9                                                                                                            # Workspace 9
bind = $mainMod, 0,             workspace, 10                                                                                                           # Workspace 10
bind = $mainMod, TAB,           workspace, e+1                                                                                                          # Next workspace
bind = $mainMod SHIFT, TAB,     workspace, e-1                                                                                                          # Prev workspace

# Move Window to Workspace
bind = $mainMod SHIFT, 1,       movetoworkspace, 1                                                                                                      # Move to workspace 1
bind = $mainMod SHIFT, 2,       movetoworkspace, 2                                                                                                      # Move to workspace 2
bind = $mainMod SHIFT, 3,       movetoworkspace, 3                                                                                                      # Move to workspace 3
bind = $mainMod SHIFT, 4,       movetoworkspace, 4                                                                                                      # Move to workspace 4
bind = $mainMod SHIFT, 5,       movetoworkspace, 5                                                                                                      # Move to workspace 5
bind = $mainMod SHIFT, 6,       movetoworkspace, 6                                                                                                      # Move to workspace 6
bind = $mainMod SHIFT, 7,       movetoworkspace, 7                                                                                                      # Move to workspace 7
bind = $mainMod SHIFT, 8,       movetoworkspace, 8                                                                                                      # Move to workspace 8
bind = $mainMod SHIFT, 9,       movetoworkspace, 9                                                                                                      # Move to workspace 9
bind = $mainMod SHIFT, 0,       movetoworkspace, 10                                                                                                     # Move to workspace 10

bind = ALT , TAB, exec, snappy-switcher next # Next workspace in snappy switcher
bind = ALT SHIFT, TAB, exec, snappy-switcher prev # previous workspace in snappy switcher


# Resize Windows
binde = $mainMod CTRL, right,   resizeactive, 10 0                                                                                                      # Resize right
binde = $mainMod CTRL, left,    resizeactive, -10 0                                                                                                     # Resize left
binde = $mainMod CTRL, up,      resizeactive, 0 -10                                                                                                     # Resize up
binde = $mainMod CTRL, down,    resizeactive, 0 10                                                                                                      # Resize down

# Mouse Binds
bindm = $mainMod, mouse:272,    movewindow                                                                                                              # Move window
bindm = $mainMod, mouse:273,    resizewindow                                                                                                            # Resize window

# Media Keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; swayosd-client --output-volume +1    # Volume up
bindel = , XF86AudioLowerVolume,  exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; swayosd-client --output-volume -1    # Volume down
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle                                   # Mute toggle
bindel = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle                                    # Mic mute
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness +5                                               # Brightness up
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness -5                                               # Brightness down

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
